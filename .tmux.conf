# ============================================================================
#  ~/.tmux.conf
#
#  Sections (top -> bottom):
#    *  EDIT ME  (your prefix)      4. Copy mode & clipboard
#    1. Terminal & colours          5. Status bar & window labels
#    2. General options             6. Custom popups (helpers in ~/.tmux/)
#    3. Key bindings                7. Plugins & session persistence
#
#  Custom popups call helper scripts in ~/.tmux/*.sh  (publish those too).
#  Reload after editing with:  prefix + r
#  NOTE: the TPM `run` line at the very bottom must stay LAST.
# ============================================================================


# ============================================================================
#  *  EDIT ME  —  the setting you're most likely to change
# ============================================================================
# Your prefix key. Change C-a below to taste (e.g. C-b, C-Space, `).
# Everything else (popups, the `prefix + ?` guide) reads this automatically,
# so this is the only place you need to touch.
set -g prefix C-a
unbind C-b
bind C-a send-prefix        # send a literal prefix to nested apps (tmux-in-tmux, etc.)


# ==========================
#  1. Terminal & colours
# ==========================
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB"


# ==========================
#  2. General options
# ==========================
# Mouse: clickable/resizable panes & windows
set -g mouse on

# Number windows and panes from 1 (0 is awkward to reach)
set -g base-index 1
setw -g pane-base-index 1

# Bigger scrollback buffer (default is 2000)
set -g history-limit 10000

# Don't let programs auto-rename windows (respects the status labels below)
set -g allow-rename off

# When a session is killed, switch to another instead of detaching
set -g detach-on-destroy off

# Multi-device: when several clients view the same session, size it to the most
# recently used one, so a background device doesn't shrink your active screen.
set -g window-size latest

# Snappier Esc, e.g. leaving insert mode in Vim (server-wide)
set -sg escape-time 10

# Command-prompt aliases:  prefix + :  then  n<enter> / k<enter>
set -s command-alias[100] 'n=new-session'
set -s command-alias[101] 'k=kill-session'


# ==========================
#  3. Key bindings
# ==========================
# Reload this config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Splits: | vertical, - horizontal (and drop the default " and % binds)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Pane navigation: Alt + arrows, no prefix.
# (Shell word-jump is unaffected: still on Ctrl+arrows / Esc-f / Esc-b.)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Window navigation: Shift + arrows, no prefix
bind -n S-Left  previous-window
bind -n S-Right next-window
# Keep the tmux default too (prefix + n / p for next/previous window)
bind n next-window
bind p previous-window


# ==========================
#  4. Copy mode & clipboard
# ==========================
# vi-style navigation/selection in copy mode (prefix + [ to enter)
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle   # block-select (default 'v' moved here)

# Used only when tmux runs locally under X. Over SSH this is a no-op: copies
# still reach the local clipboard via OSC 52 (set-clipboard defaults to external).
set -s copy-command 'xclip -selection clipboard'


# ==========================
#  5. Status bar & window labels
# ==========================
# Re-run the #() label command below every 5s
set -g status-interval 5

# Label each window by git branch -> short SHA -> dir name (see helper script)
set -g window-status-format         '#I #(~/.tmux/tmux-window-label.sh "#{pane_current_path}")'
set -g window-status-current-format '#I #[bold]#(~/.tmux/tmux-window-label.sh "#{pane_current_path}")#[nobold]'


# ==========================
#  6. Custom popups  (helpers in ~/.tmux/)
# ==========================
# prefix + j : fuzzy-jump between sessions. Shows ALL sessions including ones
#              attached on your other devices; only the current session is
#              hidden. (tmux happily multi-attaches, so both devices mirror it.)
bind j display-popup -E -w 50% -h 50% \
  "tmux list-sessions -F '#S' | grep -vxF \"\$(tmux display-message -p '#S')\" | fzf --reverse --prompt='switch session> ' | xargs -r tmux switch-client -t"

# prefix + g : new SESSION (named after the dir) = claude (left) + 2 shells (right)
bind g display-popup -E -w 60% -h 60% "~/.tmux/tmux-new-project.sh"

# prefix + a : cd every pane in this window to a picked/created dir
bind a display-popup -E -w 60% -h 60% "~/.tmux/tmux-cd-all.sh"

# prefix + . : move the current window into another session (pick or create one)
bind . display-popup -E -w 50% -h 50% "~/.tmux/tmux-move-window.sh"

# prefix + ? : curated cheat-sheet (replaces the default raw list-keys;
#              the full list is still available via  prefix + :  list-keys)
bind ? display-popup -E -w 80% -h 85% "~/.tmux/tmux-help.sh"


# ==========================
#  7. Plugins & session persistence  (TPM)
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'                 # restore last session on server start
set -g @continuum-boot 'on'                     # systemd auto-starts tmux on boot so restore can fire
                                               # (without this, continuum DISABLES the boot service on every load)
set -g @continuum-restore-max-delay '30'        # widen the post-boot window in which auto-restore may fire (default 10s)
set -g @continuum-save-interval '1'            # auto-save every minute
set -g @resurrect-capture-pane-contents 'on'   # save/restore each pane's scrollback
set -g @resurrect-processes 'vim nvim ssh htop top less tail "~python" "~node" "~npm"'

# Keep this line LAST
run '~/.tmux/plugins/tpm/tpm'
